partitions:
  - name: default
    placementrules:
      - name: provided
        create: true
      - name: username
        create: true
        parent: 
          name: root.users
      - name: fixed
        value: root.default
        create: true
    queues:
      - name: root
        submitacl: "*"
        queues:
          - name: production
            resources:
              guaranteed:
                memory: 100Gi
                vcore: 50
              max:
                memory: 200Gi
                vcore: 100
          - name: development  
            resources:
              guaranteed:
                memory: 50Gi
                vcore: 25
              max:
                memory: 100Gi
                vcore: 50
          - name: default
            resources:
              guaranteed:
                memory: 20Gi
                vcore: 10
              max:
                memory: 50Gi
                vcore: 25
          - name: users
            resources:
              guaranteed:
                memory: 10Gi
                vcore: 5
              max:
                memory: 30Gi
                vcore: 15
