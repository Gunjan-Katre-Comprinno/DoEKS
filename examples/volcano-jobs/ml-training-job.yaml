apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: ml-training-job
  namespace: default
spec:
  schedulerName: volcano
  queue: ml-training
  minAvailable: 3
  policies:
    - event: PodEvicted
      action: RestartJob
  plugins:
    ssh: []
    env: []
    svc: []
  tasks:
    - replicas: 1
      name: master
      template:
        spec:
          containers:
            - command:
                - /bin/sh
                - -c
                - |
                  echo "Starting ML training master node..."
                  sleep 300
              image: tensorflow/tensorflow:2.13.0
              name: master
              resources:
                requests:
                  cpu: "2"
                  memory: "4Gi"
                limits:
                  cpu: "4"
                  memory: "8Gi"
          restartPolicy: OnFailure
    - replicas: 2
      name: worker
      template:
        spec:
          containers:
            - command:
                - /bin/sh
                - -c
                - |
                  echo "Starting ML training worker node..."
                  sleep 300
              image: tensorflow/tensorflow:2.13.0
              name: worker
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
          restartPolicy: OnFailure
