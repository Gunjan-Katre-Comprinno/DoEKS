apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: hpc-batch-job
  namespace: default
spec:
  schedulerName: volcano
  queue: hpc-batch
  minAvailable: 4
  policies:
    - event: PodEvicted
      action: RestartJob
  plugins:
    ssh: []
    env: []
    svc: []
  tasks:
    - replicas: 4
      name: mpi-worker
      template:
        spec:
          containers:
            - command:
                - /bin/sh
                - -c
                - |
                  echo "Starting HPC batch computation..."
                  # Simulate HPC workload
                  for i in $(seq 1 100); do
                    echo "Processing batch $i/100"
                    sleep 3
                  done
                  echo "HPC batch job completed"
              image: alpine:latest
              name: worker
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
          restartPolicy: OnFailure
